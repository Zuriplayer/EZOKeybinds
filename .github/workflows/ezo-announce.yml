name: EZO announcement

on:
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: "Type PUBLISH to send to Discord. Any other value runs a dry run only."
        required: true
        default: "DRY_RUN"
      note:
        description: "Announcement text for #announcements (English only)"
        required: false
        default: "Addon update available."

jobs:
  publish-announcement:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish announcement to Discord
        shell: pwsh
        env:
          EZO_CODEX_ANNOUNCER: ${{ secrets.EZO_CODEX_ANNOUNCER }}
          CODEX_LOG: ${{ secrets.CODEX_LOG }}
          EZO_ANNOUNCE_NOTE: ${{ inputs.note }}
          EZO_CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          $publish = "$env:EZO_CONFIRM_PUBLISH" -eq "PUBLISH"
          .\scripts\ezo\publish-announcement.ps1 -Note $env:EZO_ANNOUNCE_NOTE -DryRun:(!$publish)
          .\scripts\ezo\publish-codex-log.ps1 -Action "Announcement published" -Note $env:EZO_ANNOUNCE_NOTE -DryRun:(!$publish)
